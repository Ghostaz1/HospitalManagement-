<!DOCTYPE html>
<html>
<head><title>Patients</title></head>
<body>
    <h1>Patient List</h1>
    <a href="{% url 'patient_create' %}">Add New Patient</a>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Date of Birth</th>
            <th>Age</th>
            <th>Actions</th>
        </tr>
        {% for patient in patients %}
        <tr>
            <td>{{ patient.patient_id }}</td>
            <td>{{ patient.patient_name }}</td>
            <td>{{ patient.dateofbirth }}</td>
            <td>{{ patient.age }}</td>
            <td>
                <a href="{% url 'patient_update' patient.patient_id %}">Edit</a>
                <a href="{% url 'patient_delete' patient.patient_id %}">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
